<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luvit AI Coach</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* Phone frame */
  .phone {
    width: 390px;
    height: 844px;
    background: #111;
    border-radius: 50px;
    border: 2px solid #2a2a2a;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: 0 40px 80px rgba(0,0,0,0.8), inset 0 0 0 1px #333;
  }

  /* Status bar */
  .statusbar {
    height: 44px;
    background: #111;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 28px;
    flex-shrink: 0;
  }
  .statusbar .time { color: #fff; font-size: 15px; font-weight: 600; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .statusbar .icons span { color: #fff; font-size: 12px; }

  /* Screens */
  .screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .screen.active { display: flex; }

  /* ── ONBOARDING SCREEN ── */
  #screen-onboard {
    background: linear-gradient(160deg, #1a0a2e 0%, #0d1117 60%, #0a1628 100%);
    padding: 24px 24px 32px;
    justify-content: space-between;
  }

  .onboard-header { text-align: center; padding-top: 8px; }
  .onboard-logo {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .onboard-sub { color: #6b7280; font-size: 13px; margin-top: 4px; }

  .onboard-body { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }

  .onboard-question {
    color: #e5e7eb;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    text-align: center;
    min-height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .onboard-step-dots {
    display: flex;
    justify-content: center;
    gap: 6px;
  }
  .onboard-step-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: #374151;
    transition: all .3s;
  }
  .onboard-step-dots span.active { background: #a78bfa; width: 20px; border-radius: 4px; }

  .onboard-options { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
  .option-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    color: #e5e7eb;
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 14px;
    cursor: pointer;
    transition: all .2s;
  }
  .option-btn:hover, .option-btn.selected {
    background: rgba(167,139,250,0.2);
    border-color: #a78bfa;
    color: #a78bfa;
  }

  .onboard-input-row {
    display: flex;
    gap: 10px;
  }
  .onboard-text-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    color: #fff;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 15px;
    outline: none;
  }
  .onboard-text-input:focus { border-color: #a78bfa; }
  .onboard-text-input::placeholder { color: #6b7280; }

  .btn-next {
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: opacity .2s;
    letter-spacing: 0.3px;
  }
  .btn-next:hover { opacity: 0.9; }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Coach recommendation card */
  .coach-card {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    display: none;
  }
  .coach-card.visible { display: block; }
  .coach-card .coach-emoji { font-size: 40px; margin-bottom: 8px; }
  .coach-card .coach-name { color: #fff; font-size: 20px; font-weight: 700; }
  .coach-card .coach-reason { color: #9ca3af; font-size: 13px; margin-top: 8px; line-height: 1.5; }
  .coach-card .coach-intro-text { color: #d1d5db; font-size: 14px; margin-top: 10px; line-height: 1.5; font-style: italic; }

  /* ── CHAT SCREEN ── */
  #screen-chat { background: #111; }

  .chat-header {
    background: #1a1a1a;
    padding: 12px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }
  .coach-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .chat-header-info { flex: 1; }
  .chat-header-name { color: #fff; font-size: 16px; font-weight: 700; }
  .chat-header-sub { color: #6b7280; font-size: 12px; margin-top: 1px; }
  .header-switch {
    background: rgba(255,255,255,0.07);
    border: 1px solid #333;
    color: #9ca3af;
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 12px;
    cursor: pointer;
  }
  .header-switch:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* Coach switcher panel */
  .coach-switcher {
    background: #1a1a1a;
    border-bottom: 1px solid #222;
    padding: 12px 16px;
    display: none;
    gap: 10px;
    flex-shrink: 0;
  }
  .coach-switcher.open { display: flex; }
  .switch-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 8px;
    border-radius: 14px;
    border: 1.5px solid #333;
    background: transparent;
    cursor: pointer;
    transition: all .2s;
  }
  .switch-btn.active { border-color: #7c3aed; background: rgba(124,58,237,0.15); }
  .switch-btn .se { font-size: 22px; }
  .switch-btn .sn { color: #e5e7eb; font-size: 12px; font-weight: 600; }
  .switch-btn .st { color: #6b7280; font-size: 10px; }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 0; }

  .msg { display: flex; gap: 8px; max-width: 85%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    align-self: flex-end;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    max-width: 100%;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: #1f1f1f;
    color: #e5e7eb;
    border-bottom-left-radius: 4px;
    border: 1px solid #2a2a2a;
  }

  .msg-time {
    font-size: 10px;
    color: #4b5563;
    margin-top: 4px;
    padding: 0 4px;
    align-self: flex-end;
  }

  /* Typing indicator */
  .typing { align-self: flex-start; display: flex; gap: 8px; align-items: flex-end; }
  .typing .msg-bubble {
    background: #1f1f1f;
    border: 1px solid #2a2a2a;
    padding: 12px 16px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .typing .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #6b7280;
    animation: bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: .2s; }
  .typing .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* Checkin banner */
  .checkin-banner {
    background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(37,99,235,0.2));
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 14px;
    padding: 12px 14px;
    margin: 0 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }
  .checkin-banner .cb-left { display: flex; align-items: center; gap: 10px; }
  .checkin-banner .cb-icon { font-size: 22px; }
  .checkin-banner .cb-text .cb-title { color: #e5e7eb; font-size: 13px; font-weight: 600; }
  .checkin-banner .cb-text .cb-sub { color: #6b7280; font-size: 11px; margin-top: 1px; }
  .checkin-banner .cb-arrow { color: #7c3aed; font-size: 18px; }

  /* Input area */
  .input-area {
    padding: 12px 16px 24px;
    background: #111;
    border-top: 1px solid #1f1f1f;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .msg-input {
    flex: 1;
    background: #1f1f1f;
    border: 1.5px solid #2a2a2a;
    color: #fff;
    padding: 12px 16px;
    border-radius: 24px;
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    font-family: inherit;
  }
  .msg-input:focus { border-color: #7c3aed; }
  .msg-input::placeholder { color: #4b5563; }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity .2s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }

  /* Home indicator */
  .home-indicator {
    height: 20px;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
  }
  .home-indicator span {
    width: 120px; height: 5px;
    background: #333;
    border-radius: 3px;
  }

  /* Loading spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #1f1f1f;
    border: 1px solid #333;
    color: #e5e7eb;
    padding: 10px 18px;
    border-radius: 100px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <!-- Status bar -->
  <div class="statusbar">
    <span class="time" id="clock">9:41</span>
    <div class="icons">
      <span>●●●</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- SCREEN 1: Onboarding -->
  <div class="screen active" id="screen-onboard">
    <div class="onboard-header">
      <div class="onboard-logo">LUVIT</div>
      <div class="onboard-sub">AI Personal Coach</div>
    </div>

    <div class="onboard-body">
      <div class="onboard-step-dots" id="step-dots">
        <span class="active"></span>
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="onboard-question" id="onboard-q">Nerede antrenman yapıyorsun? 🏠</div>

      <div class="onboard-options" id="onboard-options"></div>
      <div class="onboard-input-row" id="onboard-input-row" style="display:none">
        <input class="onboard-text-input" id="onboard-free" placeholder="Cevabını yaz...">
      </div>

      <!-- Coach recommendation card (step 6) -->
      <div class="coach-card" id="coach-card">
        <div class="coach-emoji" id="card-emoji"></div>
        <div class="coach-name" id="card-name"></div>
        <div class="coach-reason" id="card-reason"></div>
        <div class="coach-intro-text" id="card-intro"></div>
      </div>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextStep()" disabled>Devam →</button>
  </div>

  <!-- SCREEN 2: Chat -->
  <div class="screen" id="screen-chat">
    <div class="chat-header">
      <div class="coach-avatar" id="chat-avatar"></div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chat-name">Lucia</div>
        <div class="chat-header-sub" id="chat-sub">Kişisel Koçun • Aktif</div>
      </div>
      <button class="header-switch" onclick="toggleSwitcher()">Koç Değiştir</button>
    </div>

    <div class="coach-switcher" id="coach-switcher">
      <button class="switch-btn" id="sw-lucia" onclick="switchCoach('lucia')">
        <span class="se">💪</span>
        <span class="sn">Lucia</span>
        <span class="st">Tough love</span>
      </button>
      <button class="switch-btn" id="sw-arne" onclick="switchCoach('arne')">
        <span class="se">🧘</span>
        <span class="sn">Arne</span>
        <span class="st">Bilimsel</span>
      </button>
      <button class="switch-btn" id="sw-maya" onclick="switchCoach('maya')">
        <span class="se">🌟</span>
        <span class="sn">Maya</span>
        <span class="st">Başlangıç</span>
      </button>
    </div>

    <div class="checkin-banner" id="checkin-banner" onclick="startCheckin()" style="display:none; margin-bottom: 8px;">
      <div class="cb-left">
        <span class="cb-icon">📅</span>
        <div class="cb-text">
          <div class="cb-title">Haftalık Check-in</div>
          <div class="cb-sub">Geçen hafta nasıl gitti?</div>
        </div>
      </div>
      <span class="cb-arrow">›</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <textarea class="msg-input" id="msg-input" placeholder="Mesaj yaz..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="home-indicator"><span></span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:8000';
const USER_ID = 'demo_user_' + Math.random().toString(36).slice(2, 7);

const COACHES = {
  lucia: { name: 'Lucia', emoji: '💪', tagline: 'Tough love, gerçek sonuçlar', color: '#E63946' },
  arne:  { name: 'Arne',  emoji: '🧘', tagline: 'Bilimsel & sürdürülebilir', color: '#2D6A4F' },
  maya:  { name: 'Maya',  emoji: '🌟', tagline: 'Başlangıç dostu', color: '#F4A261' },
};

const QUESTIONS = [
  { q: 'Nerede antrenman yapıyorsun? 🏠', options: ['Ev', 'Gym', 'Dışarısı'], free: false },
  { q: 'Fitness hedefin ne? 🎯', options: ['Kilo vermek', 'Kas yapmak', 'Sağlıklı kalmak', 'Atletizm'], free: false },
  { q: 'Haftada kaç gün antrenman yapabilirsin? 📅', options: ['2-3 gün', '4-5 gün', '6-7 gün'], free: true },
  { q: 'Deneyim seviyeni nasıl tanımlarsın? 💡', options: ['Yeni başlayan', 'Orta seviye', 'İleri seviye'], free: false },
  { q: 'Herhangi bir sakatlığın var mı? 🩺', options: ['Yok'], free: true },
];

let currentStep = 0;
let pendingAnswer = null;
let activeCoach = 'lucia';
let isLoading = false;
let checkinMode = false;

// Clock
function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 10000);

// ── ONBOARDING ──────────────────────────────────────────────────────────────
function renderStep(step) {
  const q = QUESTIONS[step];
  document.getElementById('onboard-q').textContent = q.q;
  document.getElementById('btn-next').textContent = step < 4 ? 'Devam →' : 'Koçumu Bul ✨';
  document.getElementById('btn-next').disabled = true;
  pendingAnswer = null;

  // Dots
  document.querySelectorAll('#step-dots span').forEach((s, i) => {
    s.className = i === step ? 'active' : '';
  });

  // Options
  const optEl = document.getElementById('onboard-options');
  const inpRow = document.getElementById('onboard-input-row');
  const inp = document.getElementById('onboard-free');
  optEl.innerHTML = '';
  inp.value = '';

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      pendingAnswer = opt;
      document.getElementById('btn-next').disabled = false;
    };
    optEl.appendChild(btn);
  });

  if (q.free) {
    inpRow.style.display = 'flex';
    inp.placeholder = q.options.includes('Yok') ? "Varsa belirt, yoksa 'yok' yaz..." : 'Ya da kendin yaz...';
    inp.oninput = () => {
      if (inp.value.trim()) {
        pendingAnswer = inp.value.trim();
        document.getElementById('btn-next').disabled = false;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      }
    };
  } else {
    inpRow.style.display = 'none';
  }
}

async function nextStep() {
  if (!pendingAnswer || isLoading) return;

  if (currentStep === 0) {
    // First call: start session
    isLoading = true;
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-next').innerHTML = '<div class="spinner"></div>';
    await fetch(`${API}/start-conversation`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: USER_ID, answer: null })
    });
  }

  isLoading = true;
  document.getElementById('btn-next').disabled = true;
  document.getElementById('btn-next').innerHTML = '<div class="spinner"></div>';

  const res = await fetch(`${API}/start-conversation`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: USER_ID, answer: pendingAnswer })
  });
  const data = await res.json();
  isLoading = false;

  if (data.done) {
    // Show coach recommendation
    document.getElementById('onboard-options').style.display = 'none';
    document.getElementById('onboard-input-row').style.display = 'none';
    document.getElementById('onboard-q').style.display = 'none';
    document.getElementById('step-dots').style.display = 'none';

    const c = COACHES[data.recommended_coach] || COACHES.maya;
    document.getElementById('card-emoji').textContent = c.emoji;
    document.getElementById('card-name').textContent = 'Koçun: ' + c.name;
    document.getElementById('card-reason').textContent = data.reason;
    document.getElementById('card-intro').textContent = '"' + data.coach_intro + '"';
    document.getElementById('coach-card').classList.add('visible');

    activeCoach = data.recommended_coach;

    document.getElementById('btn-next').innerHTML = 'Hadi Başlayalım! 🚀';
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-next').onclick = startChat;
  } else {
    currentStep++;
    renderStep(currentStep);
    document.getElementById('btn-next').innerHTML = currentStep < 4 ? 'Devam →' : 'Koçumu Bul ✨';
  }
}

function startChat() {
  document.getElementById('screen-onboard').classList.remove('active');
  document.getElementById('screen-chat').classList.add('active');
  updateChatHeader();

  // Show check-in banner after a delay
  setTimeout(() => {
    document.getElementById('checkin-banner').style.display = 'flex';
  }, 3000);
}

// ── CHAT ────────────────────────────────────────────────────────────────────
function updateChatHeader() {
  const c = COACHES[activeCoach];
  document.getElementById('chat-avatar').textContent = c.emoji;
  document.getElementById('chat-avatar').style.background = c.color + '33';
  document.getElementById('chat-name').textContent = c.name;
  document.getElementById('chat-sub').textContent = c.tagline + ' • Aktif';

  document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
  const sw = document.getElementById('sw-' + activeCoach);
  if (sw) sw.classList.add('active');
}

function toggleSwitcher() {
  document.getElementById('coach-switcher').classList.toggle('open');
}

async function switchCoach(coachId) {
  if (coachId === activeCoach) { toggleSwitcher(); return; }
  document.getElementById('coach-switcher').classList.remove('open');
  activeCoach = coachId;
  updateChatHeader();
  showToast(COACHES[coachId].emoji + ' ' + COACHES[coachId].name + "'e geçildi");

  // Switch via API
  const res = await fetch(`${API}/switch-coach`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: USER_ID, new_coach: coachId })
  });
  const data = await res.json();
  if (data.welcome_message) {
    appendMessage('assistant', data.welcome_message, COACHES[coachId].emoji);
  }
}

function appendMessage(role, text, avatarEmoji) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const now = new Date();
  const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');

  if (role === 'assistant') {
    div.innerHTML = `
      <div class="msg-avatar">${avatarEmoji || COACHES[activeCoach].emoji}</div>
      <div>
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
        <div class="msg-time">${time}</div>
      </div>`;
  } else {
    div.innerHTML = `
      <div>
        <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
        <div class="msg-time" style="text-align:right">${time}</div>
      </div>`;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">${COACHES[activeCoach].emoji}</div>
    <div class="msg-bubble">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;
  isLoading = true;

  appendMessage('user', text);
  showTyping();

  const endpoint = checkinMode ? '/weekly-checkin' : '/chat';
  const body = checkinMode
    ? { user_id: USER_ID, message: text }
    : { user_id: USER_ID, message: text, coach: activeCoach };

  try {
    const res = await fetch(API + endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    hideTyping();
    appendMessage('assistant', data.response);

    if (checkinMode) {
      checkinMode = false;
      document.getElementById('checkin-banner').style.display = 'flex';
      showToast('Check-in tamamlandi!');
    }
  } catch (e) {
    hideTyping();
    appendMessage('assistant', 'Sunucuya bağlanılamadı. http://localhost:8000 çalışıyor mu?');
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
}

function startCheckin() {
  document.getElementById('checkin-banner').style.display = 'none';
  checkinMode = true;
  appendMessage('assistant', 'Geçen hafta nasıl gitti? Kaç antrenman yaptın, zorluk çektin mi? 📅');
  document.getElementById('msg-input').focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
renderStep(0);
</script>
</body>
</html>
